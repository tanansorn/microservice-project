services:
  consul:
    image: hashicorp/consul:1.20
    ports:
      - "8500:8500"
      - "8600:8600/udp"
    command: agent -server -bootstrap-expect=1 -ui -client=0.0.0.0
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 5s
      timeout: 3s
      retries: 5

  booking_db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: booking
    ports:
      - "5433:5432"
    volumes:
      - booking_data:/var/lib/postgresql/data

  event_db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: event
    ports:
      - "5434:5432"
    volumes:
      - event_data:/var/lib/postgresql/data

  member_db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: member
    ports:
      - "5435:5432"
    volumes:
      - member_data:/var/lib/postgresql/data

  payment_db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payment
    ports:
      - "5436:5432"
    volumes:
      - payment_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:4-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  booking:
    build:
      context: ../
      dockerfile: services/booking/Dockerfile
    ports:
      - "3001:3001"
    environment:
      CONSUL_ADDR: consul:8500
      SERVICE_HOST: booking
      DATABASE_URL: postgres://postgres:postgres@booking_db:5432/booking?sslmode=disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      - booking_db
      - rabbitmq
      - consul

  event:
    build:
      context: ../
      dockerfile: services/event/Dockerfile
    ports:
      - "3002:3002"
    environment:
      CONSUL_ADDR: consul:8500
      SERVICE_HOST: event
      DATABASE_URL: postgres://postgres:postgres@event_db:5432/event?sslmode=disable
    depends_on:
      - event_db
      - rabbitmq
      - consul

  member:
    build:
      context: ../
      dockerfile: services/member/Dockerfile
    ports:
      - "3003:3003"
    environment:
      CONSUL_ADDR: consul:8500
      SERVICE_HOST: member
      DATABASE_URL: postgres://postgres:postgres@member_db:5432/member?sslmode=disable
    depends_on:
      - member_db
      - rabbitmq
      - consul

  payment:
    build:
      context: ../
      dockerfile: services/payment/Dockerfile
    ports:
      - "3004:3004"
    environment:
      CONSUL_ADDR: consul:8500
      SERVICE_HOST: payment
      DATABASE_URL: postgres://postgres:postgres@payment_db:5432/payment?sslmode=disable
    depends_on:
      - payment_db
      - rabbitmq
      - consul

  mailer:
    build:
      context: ../
      dockerfile: services/mailer/Dockerfile
    env_file:
      - .env
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: "587"
      SMTP_EMAIL: ${SMTP_EMAIL}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
    depends_on:
      - rabbitmq

volumes:
  booking_data:
  event_data:
  member_data:
  payment_data:
